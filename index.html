<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="color-scheme" content="light" />
    <title>서울 공영주차장</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>

    <!-- 지도 (전체화면) -->
    <div id="map" aria-label="카카오 지도"></div>

    <!-- 검색 오버레이 (지도 위) -->
    <div class="searchOverlay">
      <div class="searchOverlayInner">
        <div class="searchOverlayRow">
          <span class="searchOverlayLogo">🅿️</span>
          <input
            id="stationInput"
            class="searchOverlayInput"
            type="search"
            placeholder="역이름·주소 검색 (예: 강남역)"
            autocomplete="off"
          />
          <button class="searchOverlayClear" id="btnClearStation" type="button">✕</button>
        </div>
        <div id="stationHint" class="searchOverlayHint" aria-live="polite"></div>
        <!-- TOP2 카드 (검색창 바로 아래) -->
        <div id="nearestTop3" aria-label="검색 위치 기준 가까운 주차장 TOP2"></div>
        <div class="filterRow" style="padding:0 8px 8px">
          <button class="filterChip" id="btnFilterEv" type="button">⚡ 전기차 충전</button>
          <button class="filterChip refreshChip" id="btnRefresh" type="button">🔁 <span id="btnRefreshLabel">새로고침</span></button>
        </div>
      </div>
    </div>

    <!-- 상태 pills -->
    <div class="statusBar">
      <span id="countPill" class="pill muted" aria-live="polite">준비 중…</span>
      <span id="mapProviderPill" class="pill muted">카카오맵</span>
    </div>

    <!-- 하단 시트 (주차장 선택 시) -->
    <div id="bottomSheet" class="bottomSheet" hidden>
      <div class="bottomSheetHandle" id="btnCloseSheet"></div>
      <!-- 주차장 상세 (컴팩트) -->
      <div id="detailPanel" aria-live="polite"></div>
      <!-- 주변 탭 (토글) -->
      <div id="exploreSection" style="display:none">
        <div class="tabBar" role="tablist" style="margin-top:10px">
          <button class="tab is-active" type="button" role="tab" data-explore-tab="food">🍜 맛집</button>
          <button class="tab" type="button" role="tab" data-explore-tab="fuel">⛽ 주유소</button>
        </div>
        <div class="pill muted" style="font-size:11px;margin:4px 0">반경 800m · 카카오 인기순</div>
        <div id="exploreResults" class="exploreGrid" aria-live="polite"></div>
      </div>
    </div>

    <!-- 숨김 (JS 참조용) -->
    <div hidden>
      <div id="regionSetup">
        <input id="ggKeyInput" type="hidden" />
        <input id="icKeyInput" type="hidden" />
        <div id="regionSetupHint"></div>
      </div>
      <div id="lotListGrid"></div>
      <span id="updatedAtPill"></span>
    </div>

    <div id="toast" class="toast" role="status" aria-live="assertive"></div>
    <div id="errorArea" class="errorArea" hidden></div>

    <!-- API 키 설정 모달 -->
    <div id="settingsModal" class="modalBackdrop" hidden>
      <div class="modalBox" role="dialog" aria-modal="true" aria-label="API 키 설정">
        <div class="modalHeader">
          <h2 class="modalTitle">⚙️ API 키 설정</h2>
          <button id="btnCloseSettings" type="button" class="btn ghost slim">✕</button>
        </div>
        <div class="settingsSection">
          <div class="settingsSectionTitle">🗺️ 카카오맵</div>
          <div class="hint" style="margin-bottom:8px">
            <a href="https://developers.kakao.com" target="_blank" rel="noopener">카카오 디벨로퍼스</a> → 앱 키
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <input id="kakaoJsKeyInput" class="control" type="password" placeholder="JavaScript 키" autocomplete="off" />
            <input id="kakaoRestKeyInput" class="control" type="password" placeholder="REST API 키 (맛집·주유소)" autocomplete="off" />
          </div>
        </div>
        <div class="settingsSection">
          <div class="settingsSectionTitle">🏙️ 경기도 API</div>
          <input id="ggKeyInputModal" class="control" type="password" placeholder="경기도 API 키" autocomplete="off" />
        </div>
        <div class="settingsSection">
          <div class="settingsSectionTitle">🌊 인천 API</div>
          <input id="icKeyInputModal" class="control" type="password" placeholder="인천 API 키" autocomplete="off" />
        </div>
        <div id="kakaoSetupHint" class="hint" aria-live="polite" style="color:#e53e3e;margin-top:4px"></div>
        <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
          <button id="btnSaveKakaoJsKey" type="button" class="btn primary">💾 저장 &amp; 새로고침</button>
        </div>
      </div>
    </div>

    <script defer src="./app.js"></script>
  </body>
</html>
